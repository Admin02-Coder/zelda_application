name: zelda_application
description: "ZELDA - Emergency Location Streaming & Police Control Room System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.4
  
  google_sign_in: ^6.0.0
  # Maps (OpenStreetMap - free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Location Services
  geolocator: ^13.0.2
  flutter_background_service: ^5.0.12
  flutter_local_notifications: ^18.0.1
  
  # Voice Detection
  speech_to_text: ^7.0.0
  
  # Navigation
  go_router: ^14.8.1
  
  # Storage
  flutter_secure_storage: ^9.2.4
  
  # Permissions
  permission_handler: ^11.4.0
  
  # State Management
  provider: ^6.1.2
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  
  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
